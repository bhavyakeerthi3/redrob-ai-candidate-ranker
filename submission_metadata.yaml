ai_usage_summary: |
  Used ChatGPT/Codex to inspect the challenge bundle, implement the ranker,
  generate documentation, and validate the output. No hosted LLM or external
  API is called by the ranking code.

methodology_summary: |
  Explainable hybrid ranker for the Senior AI Engineer JD. It streams JSONL
  profiles and combines six feature families: title fit, career evidence for
  production retrieval/ranking systems, trusted skill evidence, experience
  band, product-company exposure, and behavioral availability. A trap layer
  down-ranks keyword stuffing, non-target titles with AI skills, inactive
  profiles, low recruiter response, thin expert skills, and implausible career
  metadata. The system is deterministic, CPU-only, network-free, and emits
  fact-grounded reasoning for every recommended candidate.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true

